<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="256" height="256" rx="48" fill="#1a1a1a"/>

  <!-- 代码符号 -->
  <g transform="translate(64, 64)">
    <!-- 左尖括号 -->
    <path d="M40 48 L16 64 L40 80" stroke="#4CAF50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 右尖括号 -->
    <path d="M88 48 L112 64 L88 80" stroke="#4CAF50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 斜杠 -->
    <line x1="72" y1="40" x2="56" y2="88" stroke="#FF9800" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- 百分比符号 -->
  <g transform="translate(128, 160)">
    <circle cx="0" cy="0" r="40" stroke="#4CAF50" stroke-width="6" fill="none"/>
    <circle cx="0" cy="0" r="28" stroke="#FF9800" stroke-width="6" fill="none" stroke-dasharray="100" stroke-dashoffset="60"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">%</text>
  </g>
</svg>
