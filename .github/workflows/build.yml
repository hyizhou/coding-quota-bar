name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx electron-vite build

      - name: Package
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $lines = Get-Content CHANGELOG.md
          $capture = $false
          $result = @()
          foreach ($line in $lines) {
            if ($line -match "^## \[$tag\]") {
              $capture = $true
              $result += $line
              continue
            }
            if ($capture -and $line -match "^## \[") {
              break
            }
            if ($capture) {
              $result += $line
            }
          }
          ($result -join "`n").Trim() | Set-Content release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Coding Quota Bar Setup *.exe
            release/*.blockmap
            release/latest.yml
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
